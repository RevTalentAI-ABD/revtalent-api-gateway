spring.application.name=api-gateway

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8762/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=payroll-manager-reports
spring.cloud.gateway.routes[1].uri=lb://payroll-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/manager/reports/**

spring.cloud.gateway.routes[2].id=employee-service
spring.cloud.gateway.routes[2].uri=lb://employee-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/employees/**,/api/attendance/**,/api/manager/**,/api/me/**,/api/policies/**,/api/hr/**,/api/hierarchy/**,/api/kudos/**,/api/holidays/**

spring.cloud.gateway.routes[3].id=leave-service
spring.cloud.gateway.routes[3].uri=lb://leave-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/leaves/**

spring.cloud.gateway.routes[4].id=recruitment-service
spring.cloud.gateway.routes[4].uri=lb://recruitment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/recruitment/**,/api/candidates/**,/api/candidate/**,/api/resume/**,/api/screening/**

spring.cloud.gateway.routes[5].id=performance-service
spring.cloud.gateway.routes[5].uri=lb://performance-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/performance/**

spring.cloud.gateway.routes[6].id=payroll-service
spring.cloud.gateway.routes[6].uri=lb://payroll-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/payroll/**,/api/announcements/**,/api/notifications/**

spring.cloud.gateway.routes[7].id=ai-service
spring.cloud.gateway.routes[7].uri=lb://ai-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/ai/**,/api/chat/**,/api/documents/**

spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=Authorization,Content-Type,Accept,Origin,X-Requested-With,Access-Control-Request-Method,Access-Control-Request-Headers
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

