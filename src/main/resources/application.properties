spring.application.name=api-gateway

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=employee-service
spring.cloud.gateway.routes[1].uri=lb://employee-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/employees/**,/api/attendance/**,/api/manager/**,/api/me/**

spring.cloud.gateway.routes[2].id=leave-service
spring.cloud.gateway.routes[2].uri=lb://leave-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/leaves/**

spring.cloud.gateway.routes[3].id=recruitment-service
spring.cloud.gateway.routes[3].uri=lb://recruitment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/recruitment/**,/api/candidates/**,/api/candidate/**,/api/resume/**

spring.cloud.gateway.routes[4].id=performance-service
spring.cloud.gateway.routes[4].uri=lb://performance-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/performance/**

spring.cloud.gateway.routes[5].id=payroll-service
spring.cloud.gateway.routes[5].uri=lb://payroll-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/payroll/**

spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true
